<!doctype html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#000000">
<title>Chi Sampler</title>

<style>

:root{
  --bg:#000;
  --panel:#111;
  --line:#fff;
  --glow:rgba(255,230,120,0.8);
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  margin:0;
  background:var(--bg);
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
  color:white;
}

.rotate{
  display:none;
  position:fixed;
  inset:0;
  background:black;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}

@media (orientation:landscape){
  .rotate{display:flex}
  .app{display:none}
}

.app{
  max-width:520px;
  margin:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:30px;
}

.logo{
  width:100%;
  max-width:500px;
  aspect-ratio:500/182;
  border:2px solid white;
  border-radius:10px;
  background:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.logo img{
  width:100%;
  height:100%;
  object-fit:contain;
}

.pad{
  width:min(88vw,520px);
  aspect-ratio:1/1;
  border:2px solid white;
  border-radius:20px;
  background:#111;
  position:relative;
  overflow:hidden;
}

.pad img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.pad::after{
  content:"";
  position:absolute;
  inset:-14px;
  border-radius:30px;
  opacity:0;
}

.pad.active::after{
  opacity:1;
  box-shadow:
  0 0 20px var(--glow),
  0 0 60px var(--glow);
}

.status{
  font-size:13px;
  opacity:0.7;
}

</style>

</head>

<body>

<div class="rotate">
縦向きで使用してください
</div>

<div class="app">

<div class="logo">
<img src="logo.png">
</div>

<div id="pad" class="pad">
<img src="chi-button.png">
</div>

<div class="status" id="status">loading...</div>

</div>

<script>

const audioUrl="chee.mp3"

let ctx
let buffer
let ready=false

async function init(){

ctx=new (window.AudioContext||window.webkitAudioContext)({
latencyHint:"interactive"
})

const res=await fetch(audioUrl)
const arr=await res.arrayBuffer()
buffer=await ctx.decodeAudioData(arr)

document.getElementById("status").innerText="ready"
ready=true

}

function play(){

if(!ready)return

const src=ctx.createBufferSource()
src.buffer=buffer
src.connect(ctx.destination)
src.start(0)

}
