<!doctype html>

<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#000000">

<title>Chi Sampler</title>

<style>

:root{
--bg:#000;
--line:#fff;
--panel:#111;
--glow:rgba(255,230,120,0.9);
}

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
background:var(--bg);
color:white;
font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
}

.rotate{
display:none;
position:fixed;
inset:0;
background:black;
align-items:center;
justify-content:center;
font-size:20px;
font-weight:bold;
}

@media (orientation:landscape){
.rotate{display:flex}
.app{display:none}
}

.app{
max-width:520px;
margin:auto;
padding:20px;
display:flex;
flex-direction:column;
align-items:center;
gap:34px;
}

.logo{
width:100%;
max-width:500px;
aspect-ratio:500/182;
border:2px solid white;
border-radius:10px;
background:#111;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
}

.logo img{
width:100%;
height:100%;
object-fit:contain;
}

.pad{
width:min(88vw,520px);
aspect-ratio:1/1;
border:2px solid white;
border-radius:22px;
background:#111;
position:relative;
overflow:hidden;
}

.pad img{
width:100%;
height:100%;
object-fit:cover;
}

.pad::after{
content:"";
position:absolute;
inset:-14px;
border-radius:30px;
opacity:0;
transition:opacity .05s;
}

.pad.active::after{
opacity:1;
box-shadow:
0 0 25px var(--glow),
0 0 80px var(--glow);
}

.status{
font-size:13px;
opacity:.7;
}

</style>

</head>

<body>

<div class="rotate">
縦向きで使用してください
</div>

<div class="app">

<div class="logo">
<img src="logo.png" alt="">
</div>

<div id="pad" class="pad">
<img src="chi-button.png" alt="">
</div>

<div id="status" class="status">
loading...
</div>

</div>

<script>

const AUDIO_FILE="chee.mp3"

let audioContext
let audioBuffer
let ready=false

async function init(){

try{

audioContext=new (window.AudioContext||window.webkitAudioContext)({
latencyHint:"interactive"
})

const res=await fetch(AUDIO_FILE)

if(!res.ok){
throw new Error("audio load error")
}

const arr=await res.arrayBuffer()

audioBuffer=await audioContext.decodeAudioData(arr)

ready=true

document.getElementById("status").innerText="ready"

}catch(e){

document.getElementById("status").innerText="audio load error"

console.error(e)

}

}

function play(){

if(!ready)return

const src=audioContext.createBufferSource()

src.buffer=audioBuffer

src.connect(audioContext.destination)

src.start()

}

const pad=document.getElementById("pad")

pad.addEventListener("pointerdown",async()=>{

if(audioContext.state==="suspended"){
await audioContext.resume()
}

pad.classList.add("active")

play()

})

pad.addEventListener("pointerup",()=>{
pad.classList.remove("active")
})

pad.addEventListener("pointercancel",()=>{
pad.classList.remove("active")
})

init()

</script>

</body>
</html>
