<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <title>Chi Sampler</title>

  <style>
    :root{
      --bg:#000;
      --glow:rgba(255,230,120,0.92);
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
      -webkit-touch-callout:none;
      user-select:none;
      -webkit-user-select:none;
    }

    html, body{
      margin:0;
      width:100%;
      height:100%;
      background:var(--bg);
      overflow:hidden;
    }

    body{
      font-family:-apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      overscroll-behavior:none;
      position:fixed;
      inset:0;
    }

    .app{
      width:100%;
      min-height:100dvh;
      max-width:520px;
      margin:0 auto;
      display:flex;
      flex-direction:column;
      justify-content:flex-end;
      align-items:center;
      gap:24px;
      padding:
        max(24px, env(safe-area-inset-top))
        20px
        calc(72px + env(safe-area-inset-bottom));
    }

    .logo{
      width:100%;
      max-width:500px;
      aspect-ratio:500 / 182;
      display:flex;
      align-items:center;
      justify-content:center;
      margin-bottom:8px;
      flex:0 0 auto;
    }

    .logo img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
      pointer-events:none;
      -webkit-user-drag:none;
    }

    .pad{
      appearance:none;
      -webkit-appearance:none;
      border:none;
      background:none;
      padding:0;
      margin:0;
      width:min(86vw, 420px);
      aspect-ratio:1 / 1;
      position:relative;
      display:block;
      flex:0 0 auto;
      touch-action:manipulation;
    }

    .pad img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
      pointer-events:none;
      -webkit-user-drag:none;
    }

    .pad::after{
      content:"";
      position:absolute;
      inset:-10px;
      border-radius:28px;
      opacity:0;
      pointer-events:none;
      transition:opacity .05s ease;
    }

    .pad.active::after{
      opacity:1;
      box-shadow:
        0 0 24px var(--glow),
        0 0 56px var(--glow);
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="logo">
      <img src="logo.png" alt="">
    </div>

    <button id="pad" class="pad" type="button" aria-label="チーを再生">
      <img src="chi-button.png" alt="">
    </button>
  </main>

  <script>
    const AUDIO_FILE = "chee.mp3";
    const POOL_SIZE = 8;

    const pad = document.getElementById("pad");

    let audioPool = [];
    let poolIndex = 0;
    let initialized = false;

    function setActive(flag) {
      pad.classList.toggle("active", flag);
    }

    function createAudioPool() {
      audioPool = [];
      for (let i = 0; i < POOL_SIZE; i++) {
        const a = new Audio(AUDIO_FILE);
        a.preload = "auto";
        a.playsInline = true;
        a.setAttribute("playsinline", "");
        a.setAttribute("webkit-playsinline", "");
        audioPool.push(a);
      }
    }

    async function unlockAudioPool() {
      if (initialized) return;

      createAudioPool();

      // 初回タップ内で全要素を再生可能状態に寄せる
      for (const a of audioPool) {
        try {
          a.muted = true;
          a.currentTime = 0;
          await a.play();
          a.pause();
          a.currentTime = 0;
          a.muted = false;
        } catch (e) {
          console.error("unlock error:", e);
        }
      }

      initialized = true;
    }

    function playFromPool() {
      if (!initialized || audioPool.length === 0) return;

      const a = audioPool[poolIndex];
      poolIndex = (poolIndex + 1) % audioPool.length;

      try {
        a.pause();
        a.currentTime = 0;
        a.play().catch((e) => {
          console.error("play error:", e);
        });
      } catch (e) {
        console.error("play error:", e);
      }
    }

    async function handlePress(e) {
      e.preventDefault();
      setActive(true);

      if (!initialized) {
        await unlockAudioPool();
      }

      playFromPool();
    }

    function handleRelease() {
      setActive(false);
    }

    pad.addEventListener("touchstart", handlePress, { passive: false });
    pad.addEventListener("touchend", handleRelease, { passive: true });
    pad.addEventListener("touchcancel", handleRelease, { passive: true });

    pad.addEventListener("mousedown", handlePress);
    pad.addEventListener("mouseup", handleRelease);
    pad.addEventListener("mouseleave", handleRelease);

    pad.addEventListener("contextmenu", (e) => e.preventDefault());
    pad.addEventListener("dragstart", (e) => e.preventDefault());

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        setActive(false);
      }
    });
  </script>
</body>
</html>
