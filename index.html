<!doctype html>

<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#000000">

<title>Chi Sampler</title>

<style>

:root{
--bg:#000;
--glow:rgba(255,230,120,0.9);
}

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
background:var(--bg);
font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
}

.rotate{
display:none;
position:fixed;
inset:0;
background:black;
align-items:center;
justify-content:center;
font-size:20px;
font-weight:bold;
color:white;
}

@media (orientation:landscape){
.rotate{display:flex}
.app{display:none}
}

.app{
max-width:520px;
margin:auto;
padding:24px;
display:flex;
flex-direction:column;
align-items:center;
gap:40px;
}

/* ロゴ */

.logo{
width:100%;
max-width:500px;
aspect-ratio:500/182;
display:flex;
align-items:center;
justify-content:center;
}

.logo img{
width:100%;
height:100%;
object-fit:contain;
}

/* パッド */

.pad{
width:min(88vw,520px);
aspect-ratio:1/1;
position:relative;
overflow:visible;
}

.pad img{
width:100%;
height:100%;
object-fit:contain;
}

/* 発光 */

.pad::after{
content:"";
position:absolute;
inset:-14px;
border-radius:30px;
opacity:0;
transition:opacity .05s;
pointer-events:none;
}

.pad.active::after{
opacity:1;
box-shadow:
0 0 30px var(--glow),
0 0 80px var(--glow);
}

</style>

</head>

<body>

<div class="rotate">
縦向きで使用してください
</div>

<div class="app">
