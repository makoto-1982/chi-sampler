<!doctype html>

<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">

<meta name="theme-color" content="#000000">

<title>Chi Sampler</title>

<style>

:root{
--bg:#000;
--glow:rgba(255,230,120,0.9);
}

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
-webkit-touch-callout:none;
user-select:none;
-webkit-user-select:none;
}

html,body{
margin:0;
width:100%;
height:100%;
overflow:hidden;
background:var(--bg);
}

body{
font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;

position:fixed;
inset:0;

touch-action:manipulation;
overscroll-behavior:none;
}

/* アプリレイアウト */

.app{

position:fixed;
inset:0;

max-width:520px;
margin:auto;

display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-end;

gap:28px;

padding-left:24px;
padding-right:24px;
padding-bottom:calc(60px + env(safe-area-inset-bottom));
}

/* ロゴ */

.logo{
width:100%;
max-width:500px;
aspect-ratio:500/182;

display:flex;
align-items:center;
justify-content:center;

flex:0 0 auto;
}

.logo img{
width:100%;
height:100%;
object-fit:contain;

pointer-events:none;
-webkit-user-drag:none;
}

/* パッド */

.pad{

width:min(88vw,520px);
aspect-ratio:1/1;

position:relative;

touch-action:manipulation;
cursor:pointer;

flex:0 0 auto;
}

.pad img{

width:100%;
height:100%;
object-fit:contain;

pointer-events:none;
-webkit-user-drag:none;
}

/* 発光 */

.pad::after{

content:"";

position:absolute;
inset:-14px;

border-radius:30px;

opacity:0;

transition:opacity .05s;

pointer-events:none;

}

.pad.active::after{

opacity:1;

box-shadow:
0 0 30px var(--glow),
0 0 80px var(--glow);

}

</style>

</head>

<body>

<div class="app">

<div class="logo">
<img src="logo.png">
</div>

<div id="pad" class="pad">
<img src="chi-button.png">
</div>

</div>

<script>

const AUDIO_FILE="chee.mp3"

let audioContext
let audioBuffer
let ready=false

async function init(){

audioContext=new (window.AudioContext||window.webkitAudioContext)({
latencyHint:"interactive"
})

const res=await fetch(AUDIO_FILE)
const arr=await res.arrayBuffer()

audioBuffer=await audioContext.decodeAudioData(arr)

ready=true

}

function play(){

if(!ready)return

const src=audioContext.createBufferSource()

src.buffer=audioBuffer
src.connect(audioContext.destination)
src.start()

}

const pad=document.getElementById("pad")

function release(){
pad.classList.remove("active")
}

pad.addEventListener("pointerdown",async(e)=>{

e.preventDefault()

if(audioContext.state==="suspended"){
await audioContext.resume()
}

pad.classList.add("active")

play()

})

pad.addEventListener("pointerup",release)
pad.addEventListener("pointercancel",release)
pad.addEventListener("pointerleave",release)

pad.addEventListener("contextmenu",(e)=>e.preventDefault())
pad.addEventListener("dragstart",(e)=>e.preventDefault())

document.addEventListener("gesturestart",(e)=>e.preventDefault())

document.addEventListener("touchmove",(e)=>{
if(e.scale!==1)e.preventDefault()
},{passive:false})

init()

</script>

</body>
</html>
