<!doctype html>

<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#000000">

<title>Chi Sampler</title>

<style>

:root{
--bg:#000;
--glow:rgba(255,230,120,0.9);
}

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
-webkit-touch-callout:none;
user-select:none;
-webkit-user-select:none;
}

body{
margin:0;
background:var(--bg);
font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;

display:flex;
justify-content:center;

touch-action:manipulation;
overscroll-behavior:none;
}

.app{

max-width:520px;
width:100%;
height:100vh;

display:flex;
flex-direction:column;
align-items:center;

/* 下寄せレイアウト */
justify-content:flex-end;

gap:30px;

padding-bottom:80px;
padding-left:24px;
padding-right:24px;
}

/* ロゴ */

.logo{

width:100%;
max-width:500px;
aspect-ratio:500/182;

display:flex;
align-items:center;
justify-content:center;

margin-bottom:20px;
}

.logo img{
width:100%;
height:100%;
object-fit:contain;
pointer-events:none;
}

/* パッド */

.pad{

width:min(88vw,520px);
aspect-ratio:1/1;

position:relative;

touch-action:manipulation;

}

.pad img{

width:100%;
height:100%;
object-fit:contain;

pointer-events:none;
}

/* 発光 */

.pad::after{

content:"";
position:absolute;

inset:-14px;

border-radius:30px;

opacity:0;

transition:opacity .05s;

pointer-events:none;

}

.pad.active::after{

opacity:1;

box-shadow:
0 0 30px var(--glow),
0 0 80px var(--glow);

}

</style>

</head>

<body>

<div class="app">

<div class="logo">
<img src="logo.png">
</div>

<div id="pad" class="pad">
<img src="chi-button.png">
</div>

</div>

<script>

const AUDIO_FILE="chee.mp3"

let audioContext
let audioBuffer
let ready=false

async function init(){

audioContext=new (window.AudioContext||window.webkitAudioContext)({
latencyHint:"interactive"
})

const res=await fetch(AUDIO_FILE)
const arr=await res.arrayBuffer()

audioBuffer=await audioContext.decodeAudioData(arr)

ready=true

}

function play(){

if(!ready)return

const src=audioContext.createBufferSource()

src.buffer=audioBuffer
src.connect(audioContext.destination)
src.start()

}

const pad=document.getElementById("pad")

pad.addEventListener("pointerdown",async()=>{

if(audioContext.state==="suspended"){
await audioContext.resume()
}

pad.classList.add("active")

play()

})

pad.addEventListener("pointerup",()=>{
pad.classList.remove("active")
})

pad.addEventListener("pointercancel",()=>{
pad.classList.remove("active")
})

init()

</script>

</body>
</html>
