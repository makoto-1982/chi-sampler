<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
  >
  <meta name="theme-color" content="#000000">
  <title>Chi Sampler</title>

  <style>
    :root{
      --bg:#000;
      --glow:rgba(255,230,120,0.92);
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
      -webkit-touch-callout:none;
      user-select:none;
      -webkit-user-select:none;
    }

    html, body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:var(--bg);
    }

    body{
      font-family:-apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      position:fixed;
      inset:0;
      overscroll-behavior:none;
    }

    .app{
      position:fixed;
      inset:0;
      max-width:520px;
      margin:0 auto;
      left:50%;
      transform:translateX(-50%);

      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-end;
      gap:28px;

      padding:
        max(20px, env(safe-area-inset-top))
        24px
        calc(56px + env(safe-area-inset-bottom));
      overflow:hidden;
    }

    .logo{
      width:100%;
      max-width:500px;
      aspect-ratio:500 / 182;
      display:flex;
      align-items:center;
      justify-content:center;
      flex:0 0 auto;
      margin-bottom:12px;
    }

    .logo img{
      width:100%;
      height:100%;
      object-fit:contain;
      pointer-events:none;
      -webkit-user-drag:none;
      display:block;
    }

    .pad{
      appearance:none;
      -webkit-appearance:none;
      border:none;
      outline:none;
      background:transparent;
      padding:0;
      margin:0;

      width:min(88vw, 520px);
      aspect-ratio:1 / 1;
      position:relative;
      display:block;
      flex:0 0 auto;
      cursor:pointer;
      touch-action:manipulation;
    }

    .pad img{
      width:100%;
      height:100%;
      object-fit:contain;
      pointer-events:none;
      -webkit-user-drag:none;
      display:block;
    }

    .pad::after{
      content:"";
      position:absolute;
      inset:-14px;
      border-radius:30px;
      opacity:0;
      transition:opacity .05s ease;
      pointer-events:none;
    }

    .pad.active::after{
      opacity:1;
      box-shadow:
        0 0 30px var(--glow),
        0 0 80px var(--glow);
    }

    .sr-only{
      position:absolute;
      width:1px;
      height:1px;
      padding:0;
      margin:-1px;
      overflow:hidden;
      clip:rect(0,0,0,0);
      white-space:nowrap;
      border:0;
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="logo">
      <img src="logo.png" alt="">
    </div>

    <button id="pad" class="pad" type="button" aria-label="チーを再生">
      <img src="chi-button.png" alt="">
      <span class="sr-only">チーを再生</span>
    </button>
  </main>

  <script>
    const AUDIO_FILE = "chee.mp3";

    let audioContext = null;
    let audioBuffer = null;
    let loadingPromise = null;
    let unlocked = false;

    function createAudioContext() {
      if (audioContext) return audioContext;
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      audioContext = new AudioContextClass({
        latencyHint: "interactive"
      });
      return audioContext;
    }

    async function loadAudio() {
      if (audioBuffer) return audioBuffer;
      if (loadingPromise) return loadingPromise;

      loadingPromise = (async () => {
        const ctx = createAudioContext();
        const res = await fetch(AUDIO_FILE, { cache: "force-cache" });
        if (!res.ok) {
          throw new Error("音声ファイルの読み込みに失敗しました");
        }
        const arr = await res.arrayBuffer();
        audioBuffer = await ctx.decodeAudioData(arr);
        return audioBuffer;
      })();

      return loadingPromise;
    }

    async function unlockAudio() {
      const ctx = createAudioContext();
      if (ctx.state !== "running") {
        await ctx.resume();
      }

      // iPhone系で初回無音対策
      if (!unlocked) {
        const silent = ctx.createBuffer(1, 1, 22050);
        const source = ctx.createBufferSource();
        source.buffer = silent;
        source.connect(ctx.destination);
        source.start(0);
        unlocked = true;
      }
    }

    function playSound() {
      if (!audioContext || !audioBuffer) return;
      const source = audioContext.createBufferSource();
      source.buffer = audioBuffer;
      source.connect(audioContext.destination);
      source.start(0);
    }

    const pad = document.getElementById("pad");

    function setActive(on) {
      pad.classList.toggle("active", on);
    }

    async function handlePress(ev) {
      ev.preventDefault();

      try {
        setActive(true);
        await unlockAudio();
        await loadAudio();
        playSound();
      } catch (err) {
        console.error(err);
      }
    }

    function handleRelease() {
      setActive(false);
    }

    // 事前ロード
    loadAudio().catch((err) => {
      console.error(err);
    });

    // メイン操作
    pad.addEventListener("pointerdown", handlePress);
    pad.addEventListener("pointerup", handleRelease);
    pad.addEventListener("pointercancel", handleRelease);
    pad.addEventListener("pointerleave", handleRelease);

    // iOS向け保険
    pad.addEventListener("touchstart", handlePress, { passive: false });
    pad.addEventListener("touchend", handleRelease, { passive: true });

    // 不要挙動の抑止
    pad.addEventListener("contextmenu", (e) => e.preventDefault());
    pad.addEventListener("dragstart", (e) => e.preventDefault());

    // ダブルタップズームなどの暴発を軽減
    document.addEventListener("dblclick", (e) => {
      e.preventDefault();
    }, { passive: false });
  </script>
</body>
</html>
